    /* 基础样式 - 大字体适合老年人 */
    html { font-size: 18px; scroll-behavior: smooth; }

    * { box-sizing: border-box; }

    /* 自定义滚动条 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 2px; }

    /* 卡片动画 */
    .day-card { transition: all 0.3s ease; }
    .day-card:active { transform: scale(0.98); }

    /* 导航按钮特效 */
    .nav-btn {
      background: linear-gradient(135deg, #00B42A 0%, #00C853 100%);
      box-shadow: 0 4px 15px rgba(0,180,42,0.4);
      transition: all 0.2s ease;
    }
    .nav-btn:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(0,180,42,0.4); }

    /* 阶段标签颜色 */
    .phase-1 { background: linear-gradient(135deg, #FF6B6B, #FF8E53); }
    .phase-2 { background: linear-gradient(135deg, #4ECDC4, #44A08D); }
    .phase-3 { background: linear-gradient(135deg, #667eea, #764ba2); }
    .phase-4 { background: linear-gradient(135deg, #F093FB, #F5576C); }

    /* 当前日期高亮 */
    .current-day { border: 3px solid #FFD700 !important; box-shadow: 0 0 20px rgba(255,215,0,0.5); }

    /* 抢票提醒闪烁 */
    @keyframes pulse-alert { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .ticket-alert { animation: pulse-alert 1.5s infinite; }

    /* 底部导航固定 */
    .bottom-nav { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }

    /* Tab切换 */
    .tab-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .tab-btn:not(.active) { background: rgba(255,255,255,0.9); color: #6b7280; }

    /* 地图容器 */
    #mapContainer { width: 100%; height: 280px; border-radius: 0; }

    /* 驾驶信息突出显示 */
    .drive-info {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      box-shadow: 0 4px 12px rgba(59,130,246,0.3);
    }

    /* 统计卡片 */
    .stat-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }

    /* 地图信息窗体 */
    .amap-info-content { font-size: 14px; padding: 10px; }

      { name: "梵净山", coords: [108.781256, 27.918465], type: "scenic" },
      { name: "荔波", coords: [107.861111, 25.401944], type: "scenic" },
      { name: "黄果树", coords: [105.6779, 25.9881], type: "scenic" },
      { name: "昆明", coords: [102.832891, 24.880095], type: "city" },
      { name: "大理", coords: [100.267670, 25.586426], type: "scenic" },
      { name: "丽江", coords: [100.229728, 26.858308], type: "scenic" },
      { name: "西昌", coords: [102.264069, 27.889613], type: "city" },
      { name: "成都", coords: [104.065735, 30.659462], type: "city" },
      { name: "汉中", coords: [107.023162, 33.067658], type: "city" }
    ];

    // ========== 路线坐标点 ==========
    const routePath = [
      [108.707449, 34.349372], // 咸阳
      [106.551557, 29.563491], // 重庆
      [108.781256, 27.918465], // 梵净山
      [107.861111, 25.401944], // 荔波
      [105.6779, 25.9881],     // 黄果树
      [102.832891, 24.880095], // 昆明
      [100.267670, 25.586426], // 大理
      [100.229728, 26.858308], // 丽江
      [100.179138, 27.104123], // 玉龙雪山
      [102.264069, 27.889613], // 西昌
      [104.065735, 30.659462], // 成都
      [107.023162, 33.067658], // 汉中
      [108.707449, 34.349372]  // 咸阳
    ];

    // ========== 初始化高德地图 ==========
    let map = null;
    function initMap() {
      try {
        map = new AMap.Map('mapContainer', {
          zoom: 6,
          center: [104.5, 28],
          mapStyle: 'amap://styles/whitesmoke'
        });

        // 绘制路线
        const polyline = new AMap.Polyline({
          path: routePath,
          strokeColor: '#667eea',
          strokeWeight: 5,
          strokeOpacity: 0.9,
          strokeStyle: 'solid',
          lineJoin: 'round',
          showDir: true
        });
        map.add(polyline);

        // 添加城市标记
        mainCities.forEach((city, index) => {
          let markerColor = '#3b82f6'; // 默认蓝色
          let markerSize = 'small';

          if (city.type === 'start') {
            markerColor = '#22c55e';
            markerSize = 'large';
          } else if (city.type === 'scenic') {
            markerColor = '#f59e0b';
          }

          // 创建标记
          const marker = new AMap.Marker({
            position: city.coords,
            content: `<div style="
              background: ${markerColor};
              color: white;
              width: ${markerSize === 'large' ? '28px' : '22px'};
              height: ${markerSize === 'large' ? '28px' : '22px'};
              border-radius: 50%;
              display: flex;
              align-items: center;
              justify-content: center;
              font-weight: bold;
              font-size: 11px;
              box-shadow: 0 2px 8px rgba(0,0,0,0.3);
              border: 2px solid white;
            ">${index + 1}</div>`,
            offset: new AMap.Pixel(-14, -14)
          });
          map.add(marker);

          // 添加文字标签
          const label = new AMap.Text({
            text: city.name,
            position: city.coords,
            offset: new AMap.Pixel(0, -30),
            style: {
              'background': 'rgba(0,0,0,0.6)',
              'border': 'none',
              'color': 'white',
              'font-size': '12px',
              'padding': '2px 6px',
              'border-radius': '4px'
            }
          });
          map.add(label);
        });

        // 终点标记（咸阳）
        const endMarker = new AMap.Marker({
          position: [108.707449, 34.349372],
          content: `<div style="
            background: #ef4444;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 2px solid white;
          ">终</div>`,
          offset: new AMap.Pixel(-14, -14)
        });
        map.add(endMarker);

      } catch (e) {
        console.error('地图加载失败:', e);
        document.getElementById('mapContainer').innerHTML = `
          <div class="h-full bg-gradient-to-br from-purple-100 to-pink-100 flex items-center justify-center">
            <div class="text-center p-4">
              <i class="fas fa-map text-4xl text-purple-400 mb-2"></i>
              <p class="text-gray-500 text-sm">地图加载中...</p>
            </div>
          </div>
        `;
      }
    }

    // ========== 渲染行程列表 ==========
    function renderTripList(filterPhase = 0) {
      const container = document.getElementById('tripList');
      container.innerHTML = '';

      const today = new Date();
      const todayStr = today.toISOString().split('T')[0];

      tripData.forEach((trip, index) => {
        // 过滤阶段
        if (filterPhase !== 0 && trip.phase !== filterPhase) return;

        const isToday = trip.dateFull === todayStr;
        const isPast = trip.dateFull < todayStr;
        const hasDrive = trip.distance && trip.duration;

        // 阶段分隔标题
        if (index === 0 || tripData[index - 1].phase !== trip.phase) {
          const phaseHeader = document.createElement('div');
          phaseHeader.className = 'flex items-center gap-3 mt-2 mb-2';
          phaseHeader.innerHTML = `
            <div class="phase-${trip.phase} text-white text-sm font-bold px-4 py-2 rounded-full shadow-md">
              ${trip.phaseName}
            </div>
            <div class="flex-1 h-px bg-white/30"></div>
          `;
          container.appendChild(phaseHeader);
        }

        const card = document.createElement('div');
        card.className = `day-card bg-white rounded-2xl shadow-lg overflow-hidden ${isToday ? 'current-day' : ''} ${isPast ? 'opacity-60' : ''}`;
        card.id = `day-${trip.day}`;
        card.setAttribute('data-phase', trip.phase);

        const fromCoords = trip.coords.from.join(',');
        const toCoords = trip.coords.to.join(',');

        card.innerHTML = `
          <!-- 卡片头部 -->
          <div class="bg-gradient-to-r from-purple-500 to-pink-500 px-4 py-3 text-white">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold text-lg">
                  ${trip.day}
                </div>
                <div>
                  <div class="font-bold text-lg">Day ${trip.day}</div>
                  <div class="text-white/80 text-sm">${trip.date}</div>
                </div>
              </div>
              <div class="flex items-center gap-2">
                ${isToday ? '<span class="bg-yellow-400 text-yellow-900 px-3 py-1 rounded-full text-xs font-bold">今天</span>' : ''}
                ${trip.isRest ? '<span class="bg-white/20 px-3 py-1 rounded-full text-xs">休整日</span>' : ''}
              </div>
            </div>
          </div>

          <!-- 抢票提醒 -->
          ${trip.ticketAlert ? `
            <div class="ticket-alert bg-red-50 border-l-4 border-red-500 px-4 py-3">
              <div class="flex items-center gap-2 text-red-600 font-bold">
                <i class="fas fa-exclamation-triangle"></i>
                <span class="text-sm">${trip.ticketAlert}</span>
              </div>
            </div>
          ` : ''}

          <!-- 行程内容 -->
          <div class="p-4">
            <!-- 起终点 -->
            <div class="flex items-center gap-3 mb-3">
              <div class="flex-1">
                <div class="flex items-center gap-2">
                  <i class="fas fa-circle text-green-500 text-xs"></i>
                  <span class="font-bold text-gray-800 text-lg">${trip.from}</span>
                </div>
              </div>
              <div class="flex flex-col items-center px-2">
                <i class="fas fa-arrow-right text-gray-400"></i>
              </div>
              <div class="flex-1 text-right">
                <div class="flex items-center justify-end gap-2">
                  <span class="font-bold text-gray-800 text-lg">${trip.to}</span>
                  <i class="fas fa-map-marker-alt text-red-500"></i>
                </div>
              </div>
            </div>

            <!-- 驾驶信息突出显示 -->
            ${hasDrive ? `
              <div class="drive-info rounded-xl p-4 mb-3 text-white">
                <div class="flex items-center justify-center gap-8">
                  <div class="text-center">
                    <div class="text-3xl font-bold">${trip.distance}</div>
                    <div class="text-sm opacity-80">公里</div>
                  </div>
                  <div class="text-2xl opacity-60">|</div>
                  <div class="text-center">
                    <div class="text-3xl font-bold">${trip.duration}</div>
                    <div class="text-sm opacity-80">小时</div>
                  </div>
                </div>
                <div class="text-center mt-2 text-sm opacity-80">
                  <i class="fas fa-car mr-1"></i>预计驾驶时间
                </div>
              </div>
            ` : ''}

            <!-- 游玩亮点 -->
            <div class="bg-purple-50 rounded-xl p-3 mb-3">
              <div class="flex items-start gap-2">
                <i class="fas fa-star text-yellow-500 mt-0.5"></i>
                <span class="text-gray-700">${trip.highlight}</span>
              </div>
            </div>

            <!-- 门票标识 -->
            ${trip.needTicket ? `
              <div class="bg-green-50 rounded-xl p-3 mb-3 flex items-center gap-2">
                <i class="fas fa-ticket-alt text-green-600"></i>
                <span class="text-green-700 font-medium">已预约：${trip.ticketName}</span>
              </div>
            ` : ''}

            <!-- 住宿信息 -->
            <div class="border-t border-gray-100 pt-3 mt-3">
              <div class="flex items-center gap-2 text-sm text-gray-500 mb-1">
                <i class="fas fa-bed text-purple-500"></i>
                <span>住宿</span>
              </div>
              <div class="text-gray-700 font-medium">${trip.hotel}</div>
            </div>

            <!-- 导航按钮 -->
            <button onclick="navigateTo('${trip.from}', '${trip.to}', '${fromCoords}', '${toCoords}')"
                    class="nav-btn w-full mt-4 py-4 rounded-xl text-white font-bold text-lg flex items-center justify-center gap-2">
              <i class="fas fa-location-arrow"></i>
              一键导航到${trip.to}
            </button>

            ${trip.isLast ? `
              <div class="mt-4 text-center py-4 bg-gradient-to-r from-purple-100 to-pink-100 rounded-xl">
                <i class="fas fa-flag-checkered text-3xl text-purple-500 mb-2"></i>
                <div class="font-bold text-purple-700">旅程圆满结束！</div>
                <div class="text-sm text-purple-500">欢迎回家 🏠</div>
              </div>
            ` : ''}
          </div>
        `;

        container.appendChild(card);
      });
    }

    // ========== 渲染时间线视图 ==========
    function renderTimeline(filterPhase = 0) {
      const container = document.getElementById('tripTimeline');
      container.innerHTML = '';

      const today = new Date();
      const todayStr = today.toISOString().split('T')[0];

      let html = '<div class="relative">';

      tripData.forEach((trip, index) => {
        if (filterPhase !== 0 && trip.phase !== filterPhase) return;

        const isToday = trip.dateFull === todayStr;
        const isPast = trip.dateFull < todayStr;
        const hasDrive = trip.distance && trip.duration;

        html += `
          <div class="flex gap-4 mb-4 ${isPast ? 'opacity-60' : ''}" data-phase="${trip.phase}">
            <!-- 时间线左侧 -->
            <div class="flex flex-col items-center">
              <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-lg
                ${isToday ? 'bg-yellow-500 ring-4 ring-yellow-200' : `phase-${trip.phase}`}">
                ${trip.day}
              </div>
              ${index < tripData.length - 1 ? '<div class="w-0.5 flex-1 bg-gray-300 mt-2"></div>' : ''}
            </div>

            <!-- 内容卡片 -->
            <div class="flex-1 bg-white rounded-xl shadow p-3 ${isToday ? 'ring-2 ring-yellow-400' : ''}">
              <div class="flex items-center justify-between mb-2">
                <span class="font-bold text-gray-800">${trip.date}</span>
                ${hasDrive ? `<span class="text-sm font-bold text-blue-600">${trip.distance}km · ${trip.duration}h</span>` : ''}
              </div>
              <div class="font-medium text-gray-700 mb-1">
                ${trip.from} ${hasDrive ? '→' : ''} ${trip.to}
              </div>
              <div class="text-sm text-gray-500">${trip.highlight}</div>
              ${trip.ticketAlert ? `<div class="text-xs text-red-500 mt-1 font-bold">${trip.ticketAlert}</div>` : ''}
            </div>
          </div>
        `;
      });

      html += '</div>';
      container.innerHTML = html;
    }

    // ========== Tab切换 ==========
    function switchTab(tab) {
      const tabList = document.getElementById('tabList');
      const tabTimeline = document.getElementById('tabTimeline');
      const tripList = document.getElementById('tripList');
      const tripTimeline = document.getElementById('tripTimeline');

      if (tab === 'list') {
        tabList.classList.add('active');
        tabTimeline.classList.remove('active');
        tripList.classList.remove('hidden');
        tripTimeline.classList.add('hidden');
      } else {
        tabTimeline.classList.add('active');
        tabList.classList.remove('active');
        tripTimeline.classList.remove('hidden');
        tripList.classList.add('hidden');
      }
    }

    // ========== 高德地图导航 ==========
    function navigateTo(from, to, fromCoords, toCoords) {
      // 使用高德地图Web版URI
      const url = `https://uri.amap.com/navigation?from=${fromCoords}&to=${toCoords}&mode=car&policy=1&src=云贵自驾游&coordinate=gaode`;

      // 尝试唤醒高德地图APP
      const iosUrl = `iosamap://navi?sourceApplication=云贵自驾游&poiname=${encodeURIComponent(to)}&lon=${toCoords.split(',')[0]}&lat=${toCoords.split(',')[1]}&dev=0`;
      const androidUrl = `androidamap://navi?sourceApplication=云贵自驾游&poiname=${encodeURIComponent(to)}&lon=${toCoords.split(',')[0]}&lat=${toCoords.split(',')[1]}&dev=0`;

      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      const isAndroid = /Android/.test(navigator.userAgent);

      if (isIOS) {
        window.location.href = iosUrl;
        setTimeout(() => { window.open(url, '_blank'); }, 2000);
      } else if (isAndroid) {
        window.location.href = androidUrl;
        setTimeout(() => { window.open(url, '_blank'); }, 2000);
      } else {
        window.open(url, '_blank');
      }
    }

    // ========== 滚动到今天 ==========
    function scrollToToday() {
      const today = new Date();
      const todayStr = today.toISOString().split('T')[0];
      const todayTrip = tripData.find(t => t.dateFull === todayStr);

      if (todayTrip) {
        const element = document.getElementById(`day-${todayTrip.day}`);
        if (element) {
          element.scrollIntoView({ behavior: 'smooth', block: 'center' });
          element.classList.add('ring-4', 'ring-yellow-400');
          setTimeout(() => element.classList.remove('ring-4', 'ring-yellow-400'), 2000);
        }
      } else {
        // 如果不在行程中，滚动到第一个未来日期
        const futureTrip = tripData.find(t => t.dateFull >= todayStr);
        if (futureTrip) {
          const element = document.getElementById(`day-${futureTrip.day}`);
          if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        } else {
          alert('当前日期不在行程范围内，行程已结束');
        }
      }
    }

    // ========== 阶段筛选 ==========
    function filterPhase(phase) {
      document.querySelectorAll('.bottom-nav button').forEach(btn => {
        if (parseInt(btn.getAttribute('data-phase')) === phase) {
          btn.classList.remove('text-gray-500');
          btn.classList.add('text-purple-600', 'bg-purple-50');
        } else {
          btn.classList.remove('text-purple-600', 'bg-purple-50');
          btn.classList.add('text-gray-500');
        }
      });

      renderTripList(phase);
      renderTimeline(phase);
    }

    // ========== 更新进度 ==========
    function updateProgress() {
      const today = new Date();
      const todayStr = today.toISOString().split('T')[0];
      const startDate = tripData[0].dateFull;
      const endDate = tripData[tripData.length - 1].dateFull;

      const progressText = document.getElementById('progressText');
      const progressBar = document.getElementById('progressBar');

      if (todayStr < startDate) {
        // 行程尚未开始
        const daysUntil = Math.ceil((new Date(startDate) - today) / (1000 * 60 * 60 * 24));
        progressText.textContent = `行程尚未开始，还有${daysUntil}天出发`;
        progressBar.style.width = '0%';
      } else if (todayStr > endDate) {
        // 行程已结束
        progressText.textContent = '行程已结束';
        progressBar.style.width = '100%';
      } else {
        // 行程进行中
        const todayIndex = tripData.findIndex(t => t.dateFull === todayStr);
        if (todayIndex >= 0) {
          const progress = ((todayIndex + 1) / tripData.length * 100).toFixed(1);
          progressText.textContent = `第${todayIndex + 1}天 / 共${tripData.length}天`;
          progressBar.style.width = `${progress}%`;
        }
      }
    }

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', () => {
      renderTripList();
      renderTimeline();
      updateProgress();
      // 延迟加载地图
      setTimeout(initMap, 500);
    });
  </script>
</body>
</html>
